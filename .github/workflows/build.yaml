name: Build

on:
  push:
  pull_request:

jobs:
  asset-validation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate assets and lang files
        run: python tools/validate_assets.py

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Build and server GameTests
        run: ./gradlew build
      - name: Store reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/
            **/build/test-results/

  visual-qa-report:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify visual QA harness manifest
        run: python tools/visual_qa_report.py --ci-manifest-only
      - name: Store visual QA report
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-report
          path: build/visual-qa/
